name: setvault
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: setvault
      POSTGRES_PASSWORD: setvault
      POSTGRES_DB: setvault
    volumes:
      - ${SETVAULT_DB_PATH:-./.data/db}:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setvault"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt: [no-new-privileges:true]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${SETVAULT_REDIS_PATH:-./.data/redis}:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt: [no-new-privileges:true]

  tusd:
    image: tusproject/tusd:v2.4
    command: >
      -behind-proxy
      -base-path /uploads/
      -hooks-http http://web:8000/api/uploads/tusd-hooks
      -hooks-http-forward-headers Authorization,Cookie
      -upload-dir /uploads
    volumes:
      - ${SETVAULT_CACHE_PATH:-./.data/cache}/tus:/uploads
    depends_on:
      web:
        condition: service_started
    security_opt: [no-new-privileges:true]

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

  # Filesystem watcher — subscribes to admin-configured WatchFolder paths,
  # enqueues a watch_folder_ingest job per audio file detected. Shares the
  # worker image (same code + deps). Mount each WatchFolder's host_path into
  # the container at the same path the admin configured, so watchdog can see
  # the events. Disable this service if you don't use watch folders.
  watcher:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    command: ["python", "-m", "setvault_core.services.watcher"]
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Each watch-folder host path must be bind-mounted here. The default
      # leaves no folders watched; override SETVAULT_WATCH_FOLDERS_PATH (or
      # add additional `- /host/path:/host/path` lines) once you've configured
      # watch folders in the admin UI.
      - ${SETVAULT_WATCH_FOLDERS_PATH:-./.data/watch}:/srv/watch
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
