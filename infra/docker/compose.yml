name: setvault
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: setvault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-setvault}
      POSTGRES_DB: setvault
    volumes:
      - ${SETVAULT_DB_PATH:-./.data/db}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setvault"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt: [no-new-privileges:true]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${SETVAULT_REDIS_PATH:-./.data/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt: [no-new-privileges:true]

  setvault:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://setvault:${POSTGRES_PASSWORD:-setvault}@postgres:5432/setvault
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${SETVAULT_HTTP_PORT:-1970}:1970"
    volumes:
      - ${SETVAULT_MEDIA_PATH:-./.data/media}:/srv/media
      - ${SETVAULT_CACHE_PATH:-./.data/cache}:/srv/cache
      - ${SETVAULT_CONFIG_PATH:-./.data/config}:/srv/config
      - ${SETVAULT_WATCH_FOLDERS_PATH:-./.data/watch}:/srv/watch
    security_opt: [no-new-privileges:true]
