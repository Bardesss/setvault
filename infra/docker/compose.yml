name: setvault
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: setvault
      POSTGRES_PASSWORD: setvault
      POSTGRES_DB: setvault
    volumes:
      - ${SETVAULT_DB_PATH:-./.data/db}:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setvault"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt: [no-new-privileges:true]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${SETVAULT_REDIS_PATH:-./.data/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt: [no-new-privileges:true]

  tusd:
    image: tusproject/tusd:v2.4
    command: >
      -behind-proxy
      -base-path /uploads/
      -hooks-http http://web:8000/api/uploads/tusd-hooks
      -hooks-http-forward-headers Authorization,Cookie
      -upload-dir /uploads
    volumes:
      - ${SETVAULT_CACHE_PATH:-./.data/cache}/tus:/uploads
    depends_on:
      web:
        condition: service_started
    security_opt: [no-new-privileges:true]

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
