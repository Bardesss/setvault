# SetVault — minimal self-host stack
#
# 1. curl this file + .env.example into the same directory
# 2. fill in SECRET_KEY, POSTGRES_PASSWORD, BASE_URL in .env
# 3. docker compose pull && docker compose up -d
#
# Four services: setvault + postgres + redis + tusd. The setvault
# container internally runs uvicorn + RQ worker + watcher under
# s6-overlay (one image, three processes).
#
# https://github.com/Bardesss/setvault

name: setvault

services:
  setvault:
    image: ghcr.io/bardesss/setvault:${SETVAULT_VERSION:-latest}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${SETVAULT_HTTP_PORT:-8000}:8000"
    volumes:
      # All persistent state for the setvault container lives under these
      # four host paths. Defaults drop everything under ./.data/setvault.
      - ${SETVAULT_MEDIA_PATH:-./.data/media}:/srv/media
      - ${SETVAULT_CACHE_PATH:-./.data/cache}:/srv/cache
      - ${SETVAULT_CONFIG_PATH:-./.data/config}:/srv/config
      - ${SETVAULT_WATCH_FOLDERS_PATH:-./.data/watch}:/srv/watch
    restart: unless-stopped
    security_opt: [no-new-privileges:true]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-setvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-setvault}
    volumes:
      - ${SETVAULT_DB_PATH:-./.data/db}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-setvault}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    security_opt: [no-new-privileges:true]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${SETVAULT_REDIS_PATH:-./.data/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    security_opt: [no-new-privileges:true]

  tusd:
    image: tusproject/tusd:v2.4
    command: >
      -behind-proxy
      -base-path /uploads/
      -hooks-http http://setvault:8000/api/uploads/tusd-hooks
      -hooks-http-forward-headers Authorization,Cookie
      -upload-dir /uploads
    volumes:
      - ${SETVAULT_CACHE_PATH:-./.data/cache}/tus:/uploads
    depends_on:
      setvault:
        condition: service_started
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
