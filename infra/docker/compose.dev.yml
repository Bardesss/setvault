services:
  web:
    build:
      target: deps
    command: ["uv", "run", "uvicorn", "setvault_web.main:app", "--host", "0.0.0.0", "--port", "1970", "--reload"]
    volumes:
      - ../../apps/web:/srv/apps/web
      - ../../packages/core:/srv/packages/core
  worker:
    command: ["uv", "run", "python", "-m", "setvault_worker.entrypoint"]
    volumes:
      - ../../apps/worker:/srv/apps/worker
      - ../../packages/core:/srv/packages/core
