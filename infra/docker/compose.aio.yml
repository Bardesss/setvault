name: setvault
# Single-container (bundled) deployment: Postgres + Redis + tusd + Caddy all
# run inside the setvault image. One /data volume. No external datastores.
services:
  setvault:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    image: ghcr.io/bardesss/setvault:${SETVAULT_VERSION:-latest}
    environment:
      # Bundled mode needs zero config: leave these empty and the container's
      # first-boot init generates + persists SECRET_KEY and POSTGRES_PASSWORD
      # and defaults BASE_URL. Set them only to override (BASE_URL must be your
      # https:// origin when internet-facing).
      SECRET_KEY: ${SECRET_KEY:-}
      BASE_URL: ${BASE_URL:-http://localhost:1970}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    ports:
      - "${SETVAULT_HTTP_PORT:-1970}:1970"
    volumes:
      - ${SETVAULT_DATA_PATH:-./.data/setvault}:/data
    security_opt: [no-new-privileges:true]
    restart: unless-stopped
