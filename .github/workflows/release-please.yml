name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  # Needed to dispatch docker.yml below. Release-please tags the repo with the
  # built-in GITHUB_TOKEN, and GitHub deliberately does NOT fire tag-triggered
  # workflows for GITHUB_TOKEN pushes (anti-recursion). An explicit
  # workflow_dispatch, however, IS allowed — so we kick the Docker build here.
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Without this, no image is built on release: the tag push from
      # GITHUB_TOKEN can't trigger docker.yml's `on: push: tags`.
      - name: Trigger Docker build for the new tag
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run docker.yml --ref "${{ steps.release.outputs.tag_name }}" --repo "${{ github.repository }}"
