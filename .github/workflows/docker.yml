name: Docker

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Compute lowercase owner
        id: lc
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve version tag
        id: tag
        run: |
          raw="${{ github.ref_name }}"
          version="${raw#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: |
            ghcr.io/${{ steps.lc.outputs.owner }}/setvault:${{ steps.tag.outputs.version }}
            ghcr.io/${{ steps.lc.outputs.owner }}/setvault:latest

      - name: Cosign sign image digest (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/${{ steps.lc.outputs.owner }}/setvault@${{ steps.build.outputs.digest }}

      - name: Generate SBOM (CycloneDX)
        run: |
          syft "ghcr.io/${{ steps.lc.outputs.owner }}/setvault:${{ steps.tag.outputs.version }}" \
            -o cyclonedx-json > "setvault-${{ steps.tag.outputs.version }}.cdx.json"

      - name: Attest SBOM with cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes \
            --predicate "setvault-${{ steps.tag.outputs.version }}.cdx.json" \
            --type cyclonedx \
            ghcr.io/${{ steps.lc.outputs.owner }}/setvault@${{ steps.build.outputs.digest }}

      - name: Attach SBOM to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: setvault-${{ steps.tag.outputs.version }}.cdx.json
