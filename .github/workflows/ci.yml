name: CI
on:
  push: { branches: [main] }
  pull_request:

jobs:
  python:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: setvault, POSTGRES_PASSWORD: setvault, POSTGRES_DB: setvault }
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U setvault" --health-interval=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping" --health-interval=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-extras --all-groups
      - run: uv run ruff check .
      - run: uv run alembic upgrade head
      - run: uv run pytest -q
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://setvault:setvault@localhost:5432/setvault
          REDIS_URL: redis://localhost:6379/0

  frontend:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: setvault, POSTGRES_PASSWORD: setvault, POSTGRES_DB: setvault }
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U setvault" --health-interval=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping" --health-interval=5s --health-retries=10
    env:
      DATABASE_URL: postgresql+asyncpg://setvault:setvault@localhost:5432/setvault
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-for-e2e-only-base64-padded-padded-padded
      BASE_URL: http://localhost:1970
      TUSD_HOOK_SECRET: ci
      SETVAULT_DEV_SEED: "1"
      SETVAULT_ALLOW_INSECURE_COOKIE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-extras --all-groups
      - run: uv run alembic upgrade head
      - name: Start backend
        run: |
          uv run uvicorn setvault_web.main:app --host 127.0.0.1 --port 1970 \
            >uvicorn.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:1970/api/health >/dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 1
          done
          echo "backend never came up"; cat uvicorn.log; exit 1
      - run: npm ci
        working-directory: frontend
      - run: npm run check
        working-directory: frontend
      - run: npm run test:unit -- --run
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend
      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with: { name: uvicorn-log, path: uvicorn.log, if-no-files-found: ignore }
