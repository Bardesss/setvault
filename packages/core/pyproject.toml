[project]
name = "setvault-core"
version = "0.5.0"
requires-python = ">=3.12"
dependencies = [
  "setvault-providers",
  "sqlalchemy[asyncio]>=2.0.30",
  "asyncpg>=0.29",
  "alembic>=1.13",
  "pydantic>=2.7",
  "pydantic-settings>=2.3",
  "argon2-cffi>=23.1",
  "cryptography>=42.0",
  "rq>=1.16",
  "redis>=5.0",
  "structlog>=24.1",
  "python-magic>=0.4",
  "rq-scheduler>=0.13",
  "httpx>=0.27",
  "beautifulsoup4>=4.12",
  "pytesseract>=0.3.10",
  "pillow>=10.0",
  "bleach>=6.1",
  "markdown>=3.6",
  # Pinned exactly; bump via infra/scripts/update-yt-dlp.sh after a monthly
  # release-extractor check or when a user reports a URL-rip regression.
  "yt-dlp==2026.3.17",
  "watchdog>=4.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2",
  "pytest-asyncio>=0.23",
  "pytest-rerunfailures>=14",
  "defusedxml>=0.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/setvault_core"]
