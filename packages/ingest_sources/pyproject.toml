[project]
name = "setvault-ingest-sources"
version = "0.1.0"
description = "SetVault ingest source plugins (search across external audio platforms)"
requires-python = ">=3.12"
dependencies = ["yt-dlp", "httpx"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/setvault_ingest_sources"]

[dependency-groups]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "respx>=0.21"]
