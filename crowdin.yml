project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: .
preserve_hierarchy: true

files:
  - source: /frontend/src/lib/i18n/locales/en.json
    translation: /frontend/src/lib/i18n/locales/%two_letters_code%.json
    # English is the source — never target it (Crowdin can otherwise list it
    # as a target language and try to round-trip en.json back over itself).
    excluded_target_languages:
      - en
